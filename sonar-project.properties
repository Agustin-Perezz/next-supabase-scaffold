# SonarCloud project configuration
# https://docs.sonarsource.com/sonarqube/latest/project-administration/analysis-parameters/

sonar.projectKey=Agustin-Perezz_next-supabase-scaffold
sonar.organization=general-organization
sonar.projectName=next-supabase-scaffold
sonar.projectDescription=Next.js (App Router) starter with Supabase, Clean Architecture, and Playwright E2E.

# Source code layout
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Exclusions — generated/vendored/build output should not be analyzed
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/*.d.ts,\
  **/database.types.ts,\
  **/next-env.d.ts

# Test file patterns (counted as tests, not as production code)
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Coverage — Playwright/Monocart reports land under coverage/
# UI primitives (file-dropzone, button, input, etc.) are presentational components
# exercised through routes; they are excluded from the coverage gate to avoid
# requiring dedicated per-primitive E2E tests for thin render-only code.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**,\
  **/infrastructure/database/postgres/database.types.ts,\
  src/components/ui/file-dropzone.tsx,\
  src/components/ui/file-dropzone-region.tsx,\
  src/components/ui/file-dropzone-preview.tsx,\
  src/components/ui/file-dropzone-preview-item.tsx,\
  src/components/ui/file-dropzone-types.ts,\
  src/hooks/useFileDropzone.ts,\
  src/lib/utils/dropzone-errors.ts

# TypeScript-specific settings
sonar.typescript.lcov.reportPaths=coverage/tests/v8/lcov.info
sonar.javascript.lcov.reportPaths=coverage/tests/v8/lcov.info

# Quality Gate is enforced via SonarCloud's GitHub PR decoration (project is bound to GitHub).
# The scanner does not poll the Quality Gate — SonarCloud posts it as a GitHub PR check instead.
# Enable branch protection on "SonarCloud Code Analysis" check to block merges on Quality Gate failure.
